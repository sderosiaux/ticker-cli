version: "2"

linters:
  default: all
  disable:
    # struct completeness — too noisy for a CLI tool
    - exhaustruct
    # short var names are idiomatic Go
    - varnamelen
    # whitespace/style — gofmt handles this
    - wsl
    - wsl_v5
    # comment dots
    - godot
    # line length
    - lll
    # dependency policy — not needed
    - depguard
    # json tag casing style
    - tagliatelle
    # forbid fmt.Fprintf — we need it for stderr
    - forbidigo
    # magic numbers in CLI formatting are fine
    - mnd
    # Go 1.22+ handles loop var capture
    - copyloopvar
    # cognitive complexity — doublon with cyclop
    - gocognit
    # no globals — CLI needs package-level vars for flags
    - gochecknoglobals
    # no init — cobra uses init()
    - gochecknoinits
    # context in struct — not relevant here
    - containedctx
    # parallel test — httptest servers not thread-safe
    - paralleltest
    # unparam — too many false positives
    - unparam
    # declaration order
    - decorder
    # function order
    - funcorder
    # embedded struct field order
    - embeddedstructfieldcheck
    # recvcheck
    - recvcheck
  settings:
    funlen:
      lines: 100
      statements: 60
    cyclop:
      max-complexity: 15
    nestif:
      min-complexity: 5

formatters:
  enable:
    - gofmt

run:
  tests: true
  go: "1.22"

issues:
  fix: false
  max-issues-per-linter: 0
  max-same-issues: 0
